<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Loss Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2a;
    --text: #e8e8ed;
    --text-dim: #6b6b7b;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.15);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.15);
    --blue: #60a5fa;
    --yellow: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  .container { max-width: 960px; margin: 0 auto; }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .current-weight {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
  }

  .weight-change {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--accent);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .green { color: var(--accent); }
  .red { color: var(--red); }
  .blue { color: var(--blue); }
  .yellow { color: var(--yellow); }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .toggle-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .toggle-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .toggle-btn.on-white { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
  .toggle-btn.on-blue { border-color: var(--blue); color: var(--blue); background: rgba(96, 165, 250, 0.08); }
  .toggle-btn.on-green { border-color: var(--accent); color: var(--accent); background: rgba(74, 222, 128, 0.08); }
  .toggle-btn.on-yellow { border-color: var(--yellow); color: var(--yellow); background: rgba(251, 191, 36, 0.08); }

  canvas { width: 100% !important; height: 400px !important; }

  .chart-footer {
    display: flex;
    justify-content: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 16px;
    flex-wrap: wrap;
    gap: 6px;
  }

  .range-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }

  .range-tab {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .range-tab:hover { color: var(--text); }
  .range-tab.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .milestones {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .milestone-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .milestone-row:last-child { border-bottom: none; }

  .milestone-weight {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    min-width: 80px;
  }

  .milestone-label {
    font-size: 14px;
    color: var(--text-dim);
    flex: 1;
    margin: 0 16px;
  }

  .milestone-date {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .milestone-check { color: var(--accent); margin-right: 8px; }
  .milestone-pending { color: var(--text-dim); margin-right: 8px; }

  .progress-bar-container {
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #22d3ee);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .progress-percent {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .weekly-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
  }

  tr:last-child td { border-bottom: none; }

  /* ── Log Entry Panel ── */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .log-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .log-form {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .log-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-field label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  .log-field input {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 160px;
  }

  .log-field input:focus { border-color: var(--accent); }

  .log-submit {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: rgba(74, 222, 128, 0.1);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .log-submit:hover { background: rgba(74, 222, 128, 0.2); }
  .log-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .log-status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    margin-top: 10px;
    min-height: 16px;
  }

  .log-status.ok { color: var(--accent); }
  .log-status.err { color: var(--red); }
  .log-status.loading { color: var(--text-dim); }

  /* ── Settings button + modal ── */
  .settings-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .settings-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .settings-btn.configured { border-color: var(--accent); color: var(--accent); }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: min(520px, 90vw);
  }

  .modal-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .modal-sub a { color: var(--blue); text-decoration: none; }
  .modal-sub a:hover { text-decoration: underline; }

  .modal-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .modal-field label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  .modal-field input {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .modal-field input:focus { border-color: var(--accent); }

  .modal-field .hint {
    font-size: 11px;
    color: var(--text-dim);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .modal-btn-save {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: rgba(74,222,128,0.1);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn-save:hover { background: rgba(74,222,128,0.2); }

  .modal-btn-cancel {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── Gist sync indicator ── */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .sync-dot.ok { background: var(--accent); }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="container">
  <h1>Weight Loss Tracker</h1>
  <div class="title-row">
    <span class="current-weight" id="currentWeight"></span>
    <span class="weight-change" id="totalChange"></span>
  </div>

  <div class="progress-bar-container">
    <div class="chart-title" style="margin-bottom:12px">Progress to 170 lbs</div>
    <div class="progress-labels">
      <span>255 lbs</span>
      <span class="green">170 lbs</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-percent" id="progressPercent"></div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="chart-container">
    <div class="chart-header">
      <div class="chart-title">Weight Over Time + Projection</div>
      <div class="range-tabs" id="rangeTabs">
        <button class="range-tab" data-range="7">7D</button>
        <button class="range-tab" data-range="30">30D</button>
        <button class="range-tab active" data-range="all">All</button>
      </div>
    </div>
    <canvas id="weightChart"></canvas>
    <div class="chart-footer">
      <div class="toggle-group" id="toggleGroup"></div>
    </div>
  </div>

  <div class="milestones">
    <div class="chart-title" style="margin-bottom:20px">Milestones & Projected Dates</div>
    <div id="milestoneList"></div>
  </div>

  <div class="weekly-table">
    <div class="chart-title" style="margin-bottom:20px">Weekly Averages</div>
    <table>
      <thead>
        <tr><th>Week</th><th>Avg Weight</th><th>Change</th><th>Rate</th></tr>
      </thead>
      <tbody id="weeklyBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const rawData = [
  ["2025-09-06", 255.0],
  ["2025-10-18", 219.8], ["2025-10-22", 220.9], ["2025-10-23", 220.2], ["2025-10-24", 219.7],
  ["2025-10-25", 216.5], ["2025-10-26", 218.8], ["2025-10-27", 220.1], ["2025-10-28", 219.6],
  ["2025-10-29", 218.9], ["2025-10-30", 218.1], ["2025-10-31", 216.8], ["2025-11-01", 214.0],
  ["2025-11-03", 218.5], ["2025-11-04", 216.7], ["2025-11-05", 215.4], ["2025-11-06", 215.1],
  ["2025-11-07", 214.1], ["2025-11-08", 213.3], ["2025-11-10", 215.6], ["2025-11-11", 214.2],
  ["2025-11-12", 213.8], ["2025-11-13", 213.4], ["2025-11-14", 211.9], ["2025-11-15", 210.1],
  ["2025-11-16", 209.5], ["2025-11-17", 214.2], ["2025-11-18", 213.4], ["2025-11-19", 212.4],
  ["2025-11-20", 211.6], ["2025-11-21", 211.0], ["2025-11-22", 210.4], ["2025-11-23", 209.7],
  ["2025-11-24", 210.6], ["2025-11-25", 211.8], ["2025-11-26", 211.6], ["2025-11-27", 209.4],
  ["2025-11-28", 213.6], ["2025-11-29", 211.8], ["2025-11-30", 209.6], ["2025-12-01", 211.6],
  ["2025-12-02", 206.7], ["2025-12-03", 209.7], ["2025-12-04", 208.3], ["2025-12-05", 207.9],
  ["2025-12-06", 206.4], ["2025-12-08", 211.5], ["2025-12-09", 210.4], ["2025-12-10", 208.6],
  ["2025-12-11", 207.1], ["2025-12-12", 206.9], ["2025-12-13", 205.7], ["2025-12-14", 205.0],
  ["2025-12-15", 208.5], ["2025-12-16", 207.6], ["2025-12-18", 206.9], ["2025-12-19", 206.0],
  ["2025-12-20", 206.0], ["2025-12-21", 206.1], ["2025-12-22", 209.8], ["2025-12-24", 207.2],
  ["2026-01-05", 209.9], ["2026-01-07", 206.5], ["2026-01-09", 205.7], ["2026-01-10", 203.2],
  ["2026-01-13", 205.7], ["2026-01-14", 204.9], ["2026-01-15", 203.4], ["2026-01-16", 202.0],
  ["2026-01-17", 199.6], ["2026-01-18", 200.0], ["2026-01-19", 204.8], ["2026-01-20", 204.4],
  ["2026-01-21", 202.8], ["2026-01-22", 201.8], ["2026-01-23", 201.3], ["2026-01-24", 199.7],
  ["2026-01-28", 204.4], ["2026-01-29", 203.4], ["2026-01-30", 201.9], ["2026-01-31", 200.1],
  ["2026-02-01", 201.4], ["2026-02-02", 202.1], ["2026-02-03", 201.5], ["2026-02-04", 199.7],
  ["2026-02-05", 198.5], ["2026-02-06", 197.0], ["2026-02-09", 201.4], ["2026-02-10", 199.7],
  ["2026-02-11", 197.9], ["2026-02-12", 197.6], ["2026-02-13", 197.4], ["2026-02-14", 196.1],
  ["2026-02-15", 195.9], ["2026-02-16", 201.1], ["2026-02-18", 199.0], ["2026-02-19", 198.2],
  ["2026-02-20", 196.4], ["2026-02-21", 194.4], ["2026-02-22", 191.8], ["2026-02-23", 200.2], 
  ["2026-02-24", 198.3], ["2026-02-25", 196.4], ["2026-02-26", 194.7], ["2026-02-27", 195.1],
  ["2026-02-28", 193.8], ["2026-03-01", 192.9], ["2026-03-02", 199.5], ["2026-03-03", 196.7],
  ["2026-03-04", 195.5], ["2026-03-05", 193.5], ["2026-03-06", 193.0], ["2026-03-07", 194.3]
];

const dates = rawData.map(d => new Date(d[0]));
const weights = rawData.map(d => d[1]);

// Linear regression
const startDate = dates[0].getTime();
const xVals = dates.map(d => (d.getTime() - startDate) / (1000 * 60 * 60 * 24));
const n = xVals.length;
const sumX = xVals.reduce((a, b) => a + b, 0);
const sumY = weights.reduce((a, b) => a + b, 0);
const sumXY = xVals.reduce((a, x, i) => a + x * weights[i], 0);
const sumXX = xVals.reduce((a, x) => a + x * x, 0);
const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
const intercept = (sumY - slope * sumX) / n;
const trendLine = xVals.map(x => intercept + slope * x);

const ratePerDay = Math.abs(slope);
const ratePerWeek = ratePerDay * 7;

// 7-day moving average
const movingAvg = weights.map((w, i) => {
  if (i < 6) return null;
  let sum = 0;
  for (let j = i - 6; j <= i; j++) sum += weights[j];
  return +(sum / 7).toFixed(1);
});

// Projections
const lastDate = dates[dates.length - 1];
const lastTrend = intercept + slope * xVals[xVals.length - 1];
const targetWeights = [190, 185, 180, 175, 170];
const projections = targetWeights.map(target => {
  const daysToTarget = (lastTrend - target) / ratePerDay;
  const targetDate = new Date(lastDate.getTime() + daysToTarget * 24 * 60 * 60 * 1000);
  return { weight: target, date: targetDate, days: Math.round(daysToTarget) };
});

const projDates = [];
const projWeights = [];
const daysTo170 = (lastTrend - 170) / ratePerDay;
for (let d = 0; d <= daysTo170 + 7; d += 3) {
  const projDate = new Date(lastDate.getTime() + d * 24 * 60 * 60 * 1000);
  const projWeight = lastTrend + slope * d;
  if (projWeight >= 169) {
    projDates.push(projDate);
    projWeights.push(+projWeight.toFixed(1));
  }
}

// Stats
const currentWeight = weights[weights.length - 1];
const startWeight = weights[0];
const daysElapsed = xVals[xVals.length - 1];
const weeksElapsed = daysElapsed / 7;

// Use 7-day average as the display weight for header + progress bar
const latestMovingAvg = movingAvg.filter(v => v !== null);
const displayWeight = latestMovingAvg[latestMovingAvg.length - 1];
const totalLost = startWeight - displayWeight;
const lbsToGo = displayWeight - 170;

const fourWeeksAgo = new Date(lastDate.getTime() - 28 * 24 * 60 * 60 * 1000);
const recentData = rawData.filter(d => new Date(d[0]) >= fourWeeksAgo);
const recentStart = recentData[0][1];
const recentEnd = recentData[recentData.length - 1][1];
const recentRate = (recentStart - recentEnd) / 4;

const lowestWeight = Math.min(...weights);
const lowestIdx = weights.indexOf(lowestWeight);
const lowestDate = dates[lowestIdx];
const lowestDateStr = lowestDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

document.getElementById('currentWeight').textContent = displayWeight.toFixed(1);
document.getElementById('totalChange').textContent = `↓ ${totalLost.toFixed(1)} lbs from ${startWeight}`;

// Progress bar
const totalGoal = startWeight - 170;
const progressPct = Math.min(((totalLost / totalGoal) * 100), 100).toFixed(1);
document.getElementById('progressBar').style.width = progressPct + '%';
document.getElementById('progressPercent').textContent = lbsToGo > 0
  ? `${progressPct}% complete · ${lbsToGo.toFixed(1)} lbs to go`
  : '100% complete — Goal reached!';

// Stats grid
document.getElementById('statsGrid').innerHTML = `
  <div class="stat-card">
    <div class="stat-label">Total Lost</div>
    <div class="stat-value green">${totalLost.toFixed(1)} lbs</div>
    <div class="stat-sub">in ${Math.round(weeksElapsed)} weeks</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Rate (Overall)</div>
    <div class="stat-value green">${ratePerWeek.toFixed(1)} lbs/wk</div>
    <div class="stat-sub">trend line slope</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Recent 4-Week Rate</div>
    <div class="stat-value blue">${recentRate.toFixed(1)} lbs/wk</div>
    <div class="stat-sub">last 28 days</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Lowest Weigh-In</div>
    <div class="stat-value yellow">${lowestWeight} lbs</div>
    <div class="stat-sub">${lowestDateStr}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">ETA to 170</div>
    <div class="stat-value green">${projections[4].date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
    <div class="stat-sub">${projections[4].days} days at current trend</div>
  </div>
`;

// Milestones
const milestoneTargets = [
  { w: 255, label: 'Day 1 — Starting weight' },
  { w: 240, label: 'First 15 down' },
  { w: 220, label: 'Daily tracking begins' },
  { w: 210, label: '45 lbs down' },
  { w: 200, label: 'Under 200 — Onederland' },
  { w: 190, label: '65 lbs down — Into the 180s' },
  { w: 185, label: '70 lbs down' },
  { w: 180, label: '75 lbs down — Into the 170s' },
  { w: 175, label: '80 lbs down' },
  { w: 170, label: '85 lbs down — Target weight' },
  { w: 165, label: '90 lbs down — Stretch goal' },
];

let milestoneHTML = '';
milestoneTargets.forEach(m => {
  const achieved = displayWeight <= m.w;
  const icon = achieved ? '<span class="milestone-check">✓</span>' : '<span class="milestone-pending">○</span>';
  let dateStr = '';
  if (achieved) {
    const hitEntry = rawData.find(d => d[1] <= m.w);
    if (hitEntry) dateStr = new Date(hitEntry[0]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } else {
    const daysNeeded = (lastTrend - m.w) / ratePerDay;
    if (daysNeeded > 0) {
      const projDate = new Date(lastDate.getTime() + daysNeeded * 24 * 60 * 60 * 1000);
      dateStr = '~' + projDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
  }
  milestoneHTML += `
    <div class="milestone-row">
      <div>${icon}<span class="milestone-weight" style="color:${achieved ? 'var(--accent)' : 'var(--text-dim)'}">${m.w}</span></div>
      <div class="milestone-label">${m.label}</div>
      <div class="milestone-date">${dateStr}</div>
    </div>
  `;
});
document.getElementById('milestoneList').innerHTML = milestoneHTML;

// Weekly averages
const weeklyData = {};
rawData.forEach(([dateStr, weight]) => {
  const d = new Date(dateStr);
  const weekStart = new Date(d);
  weekStart.setDate(d.getDate() - d.getDay());
  const key = weekStart.toISOString().slice(0, 10);
  if (!weeklyData[key]) weeklyData[key] = [];
  weeklyData[key].push(weight);
});

const weeks = Object.keys(weeklyData).sort();
let weeklyHTML = '';
weeks.forEach((week, i) => {
  const avg = weeklyData[week].reduce((a, b) => a + b, 0) / weeklyData[week].length;
  const prevAvg = i > 0 ? weeklyData[weeks[i-1]].reduce((a, b) => a + b, 0) / weeklyData[weeks[i-1]].length : null;
  const change = prevAvg ? avg - prevAvg : null;
  const weekDate = new Date(week);
  const weekLabel = weekDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const clr = change !== null && change < 0 ? 'var(--accent)' : change > 0 ? 'var(--red)' : 'var(--text-dim)';
  weeklyHTML += `
    <tr>
      <td>${weekLabel}</td>
      <td style="font-family:'Space Mono',monospace;font-weight:700">${avg.toFixed(1)}</td>
      <td style="font-family:'Space Mono',monospace;color:${clr}">${change !== null ? (change > 0 ? '+' : '') + change.toFixed(1) : '—'}</td>
      <td style="font-family:'Space Mono',monospace;color:${clr}">${change !== null ? (change > 0 ? '+' : '') + change.toFixed(1) + '/wk' : '—'}</td>
    </tr>
  `;
});
document.getElementById('weeklyBody').innerHTML = weeklyHTML;

// Chart — dataset index 4 is the target line (always visible, no toggle)
const toggleConfig = [
  { label: 'Daily', colorClass: 'on-white', datasetIndex: 0 },
  { label: '7-Day Avg', colorClass: 'on-blue', datasetIndex: 1 },
  { label: 'Trend', colorClass: 'on-green', datasetIndex: 2 },
  { label: 'Projection', colorClass: 'on-green', datasetIndex: 3 },
];

// Build datasets for a given range ('7', '30', or 'all')
function buildChartData(range) {
  let filteredDates = dates;
  let filteredWeights = weights;
  let filteredTrend = trendLine;
  let filteredMovingAvg = movingAvg;

  if (range !== 'all') {
    const days = parseInt(range);
    const cutoff = new Date(lastDate.getTime() - days * 24 * 60 * 60 * 1000);
    const startIdx = rawData.findIndex(d => new Date(d[0]) >= cutoff);
    filteredDates = dates.slice(startIdx);
    filteredWeights = weights.slice(startIdx);
    filteredTrend = trendLine.slice(startIdx);
    filteredMovingAvg = movingAvg.slice(startIdx);
  }

  // Only include projection on 'all' view
  const includeProjDates = range === 'all' ? projDates : [];
  const includeProjWeights = range === 'all' ? projWeights : [];
  const projLen = includeProjDates.length;

  const labels = [
    ...filteredDates.map(d => d.toISOString().slice(0, 10)),
    ...includeProjDates.map(d => d.toISOString().slice(0, 10))
  ];

  // Dynamic y scale range
  const allVisible = [...filteredWeights, ...includeProjWeights];
  const yMin = Math.floor(Math.min(...allVisible) / 5) * 5 - 5;
  const yMax = Math.ceil(Math.max(...allVisible) / 5) * 5 + 5;

  return {
    labels,
    datasets: [
      {
        label: 'Daily Weight',
        data: [...filteredWeights, ...Array(projLen).fill(null)],
        borderColor: 'rgba(255, 255, 255, 0.3)',
        pointRadius: range === '7' ? 3 : 1.5,
        pointBackgroundColor: 'rgba(255, 255, 255, 0.5)',
        borderWidth: 1,
        tension: 0.1,
        fill: false,
      },
      {
        label: '7-Day Average',
        data: [...filteredMovingAvg, ...Array(projLen).fill(null)],
        borderColor: '#60a5fa',
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
        fill: false,
      },
      {
        label: 'Trend Line',
        data: [...filteredTrend.map(v => +v.toFixed(1)), ...Array(projLen).fill(null)],
        borderColor: 'rgba(74, 222, 128, 0.5)',
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        tension: 0,
        fill: false,
      },
      {
        label: 'Projection',
        data: [...Array(filteredWeights.length).fill(null), ...includeProjWeights],
        borderColor: 'rgba(74, 222, 128, 0.35)',
        borderWidth: 2,
        borderDash: [4, 6],
        pointRadius: 0,
        tension: 0,
        fill: false,
      },
      {
        label: '170 Target',
        data: Array(filteredWeights.length + projLen).fill(170),
        borderColor: 'rgba(251, 191, 36, 0.3)',
        borderWidth: 1,
        borderDash: [3, 3],
        pointRadius: 0,
        fill: false,
      }
    ],
    yMin,
    yMax,
  };
}

let currentRange = 'all';
const initialData = buildChartData(currentRange);

const ctx = document.getElementById('weightChart').getContext('2d');
const weightChart = new Chart(ctx, {
  type: 'line',
  data: { labels: initialData.labels, datasets: initialData.datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1e1e2a',
        titleColor: '#e8e8ed',
        bodyColor: '#e8e8ed',
        borderColor: '#2e2e3a',
        borderWidth: 1,
        titleFont: { family: 'Space Mono', size: 12 },
        bodyFont: { family: 'DM Sans', size: 12 },
      }
    },
    scales: {
      x: {
        ticks: { color: '#4a4a5a', font: { family: 'Space Mono', size: 10 }, maxTicksLimit: 12, maxRotation: 45 },
        grid: { color: 'rgba(255,255,255,0.03)' },
      },
      y: {
        min: initialData.yMin,
        max: initialData.yMax,
        ticks: { color: '#4a4a5a', font: { family: 'Space Mono', size: 11 }, stepSize: 5 },
        grid: { color: 'rgba(255,255,255,0.05)' },
      }
    }
  }
});

// Remember hidden state per dataset across range switches
const hiddenState = [false, false, false, false]; // indices 0-3 (target is always shown)

// Range tab switching
document.querySelectorAll('.range-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRange = tab.dataset.range;

    const newData = buildChartData(currentRange);
    weightChart.data.labels = newData.labels;
    newData.datasets.forEach((ds, i) => {
      weightChart.data.datasets[i].data = ds.data;
      weightChart.data.datasets[i].pointRadius = ds.pointRadius;
    });

    // Restore hidden states
    hiddenState.forEach((hidden, i) => {
      weightChart.getDatasetMeta(i).hidden = hidden;
    });

    weightChart.options.scales.y.min = newData.yMin;
    weightChart.options.scales.y.max = newData.yMax;
    weightChart.update();
  });
});

// Build series toggle buttons (only for the first 4 datasets — Target line has no toggle)
const toggleGroup = document.getElementById('toggleGroup');
toggleConfig.forEach((cfg) => {
  const btn = document.createElement('button');
  btn.className = `toggle-btn ${cfg.colorClass}`;
  btn.textContent = cfg.label;
  btn.addEventListener('click', () => {
    const meta = weightChart.getDatasetMeta(cfg.datasetIndex);
    meta.hidden = !meta.hidden;
    hiddenState[cfg.datasetIndex] = meta.hidden;
    btn.className = meta.hidden ? 'toggle-btn' : `toggle-btn ${cfg.colorClass}`;
    weightChart.update();
  });
  toggleGroup.appendChild(btn);
});
</script>
</body>
</html>
